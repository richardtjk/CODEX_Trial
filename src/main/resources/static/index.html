<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Generator API Tester</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; background: #f8fafc; color: #111827; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 1rem; max-width: 900px; }
    textarea { width: 100%; min-height: 220px; font-family: monospace; margin-top: .5rem; }
    input { width: 90px; margin-right: .75rem; }
    button { background:#2563eb; color:#fff; border:0; padding:.6rem 1rem; border-radius:8px; cursor:pointer; }
    pre { background:#0b1020; color:#d1fae5; padding:1rem; border-radius:8px; overflow:auto; }
    .row { margin: .75rem 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Generate Teams API Tester</h1>
    <p>Use this page to test <code>POST /api/teams/generate</code>.</p>

    <div class="row">
      <label>API Base URL:</label>
      <input id="baseUrl" style="width:260px" value="http://localhost:8080" />
    </div>

    <div class="row">
      <label>minTeamSize</label><input id="minTeamSize" type="number" value="2" />
      <label>maxTeamSize</label><input id="maxTeamSize" type="number" value="4" />
      <label>idealTeamSize</label><input id="idealTeamSize" type="number" value="3" />
    </div>

    <div class="row">
      <label for="participants">Participants (comma or newline separated)</label>
      <textarea id="participants">Alice, Bob, Charlie, Dana, Eli, Fran, Gabe, Hana</textarea>
    </div>

    <button id="sendBtn">Generate Teams</button>
    <h3>Response</h3>
    <pre id="output">No request sent yet.</pre>
  </div>

  <script>
    const sendBtn = document.getElementById('sendBtn');
    const output = document.getElementById('output');

    function parseParticipants(raw) {
      return raw
        .split(/[\n,]/)
        .map(v => v.trim())
        .filter(Boolean);
    }

    sendBtn.addEventListener('click', async () => {
      const baseUrl = document.getElementById('baseUrl').value.trim().replace(/\/$/, '');
      const payload = {
        participants: parseParticipants(document.getElementById('participants').value),
        minTeamSize: Number(document.getElementById('minTeamSize').value),
        maxTeamSize: Number(document.getElementById('maxTeamSize').value),
        idealTeamSize: Number(document.getElementById('idealTeamSize').value)
      };

      output.textContent = 'Sending request...';

      try {
        const response = await fetch(`${baseUrl}/api/teams/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const text = await response.text();
        let parsed;
        try { parsed = JSON.parse(text); } catch { parsed = text; }

        output.textContent = JSON.stringify({
          status: response.status,
          ok: response.ok,
          body: parsed
        }, null, 2);
      } catch (error) {
        output.textContent = JSON.stringify({
          error: String(error),
          hint: 'Ensure the Spring Boot service is running and accessible from this browser.'
        }, null, 2);
      }
    });
  </script>
</body>
</html>
