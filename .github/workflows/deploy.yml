name: Deploy to VM (direct Spring Boot)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build jar
        run: mvn -B -DskipTests package

      - name: Upload jar and deploy script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "target/team-service-0.0.1-SNAPSHOT.jar,scripts/deploy-systemd.sh"
          target: ${{ secrets.DEPLOY_PATH || '/tmp/team-service-deploy' }}
          overwrite: true

      - name: Install Java and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH || '/tmp/team-service-deploy' }}"
            cd "$DEPLOY_PATH"
            APP_NAME="team-service" \
            APP_DIR="/opt/team-service" \
            APP_PORT="${{ secrets.APP_PORT || 8080 }}" \
            JAR_SOURCE="$DEPLOY_PATH/target/team-service-0.0.1-SNAPSHOT.jar" \
            bash "$DEPLOY_PATH/scripts/deploy-systemd.sh"
